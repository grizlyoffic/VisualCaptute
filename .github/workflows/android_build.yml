name: Android APK Cloud Compiler

on:
  push:
    branches: [ v2.0.0 ]
  workflow_dispatch: # Allows you to trigger a build manually anytime via the website

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x gradlew

    - name: Build Debug APK with Gradle Cloud Workers
      run: ./gradlew assembleDebug

    - name: Upload Finished V2.0.0 APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AkiruAccess_V2.0.0_CloudBuild
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
